name: Deploy Frontend to Render

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - revampedWebsite

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Deploy Frontend (Prod)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RENDER_SERVICE_ID: srv-ctlrb2qj1k6c73d2bhv0
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Build Frontend
        working-directory: client
        run: |
          npm ci
          npm run build
      - name: Trigger Render Deploy
        if: env.RENDER_SERVICE_ID != ''
        run: |
          curl -sS -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys"

  deploy-dev:
    name: Deploy Frontend (Dev)
    if: github.ref == 'refs/heads/revampedWebsite'
    runs-on: ubuntu-latest
    env:
      RENDER_SERVICE_ID: srv-d6nuvt7gi27c73acjpmg
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Build Frontend
        working-directory: client
        run: |
          npm ci
          npm run build:dev
      - name: Trigger Render Deploy
        if: env.RENDER_SERVICE_ID != ''
        run: |
          curl -sS -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys"
